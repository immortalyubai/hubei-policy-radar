name: Collect Hubei policies

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:

concurrency:
  group: policy-radar-hubei-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify collector secrets
        run: test -n "$POLICY_RADAR_URL" && test -n "$POLICY_INGEST_KEY"
        env:
          POLICY_RADAR_URL: ${{ secrets.POLICY_RADAR_URL }}
          POLICY_INGEST_KEY: ${{ secrets.POLICY_INGEST_KEY }}
      - name: Collect and ingest Hubei policies
        run: npm run collect:hubei -- --limit 12
        env:
          POLICY_RADAR_URL: ${{ secrets.POLICY_RADAR_URL }}
          POLICY_INGEST_KEY: ${{ secrets.POLICY_INGEST_KEY }}
